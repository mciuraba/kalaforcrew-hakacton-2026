<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toxic Frog Game - Ekran Główny</title>
    <link rel="stylesheet" href="mainpage_styles.css">
</head>
<body>
    <div class="container">
        <!-- Sekcja powitania i wpisania nicku -->
        <div class="welcome-section">
            <h1>🐸 Witaj w Toxic Frog Game! 🐸</h1>
            <form id="nicknameForm" class="nickname-form">
                <label for="nicknameInput">Podaj swój nickname:</label>
                <input 
                    type="text" 
                    id="nicknameInput" 
                    name="nickname" 
                    placeholder="Wpisz swój nick..."
                    maxlength="20"
                    required
                >
                <p class="info-text">Wybierz swoją żabkę poniżej</p>
            </form>
        </div>

        <!-- Sekcja galerii żabek -->
        <div class="frog-gallery">
            <h2>Wybierz swoją żabkę</h2>
            <div class="gallery-grid">
                <!-- BlueBlue -->
                <button class="frog-button" data-frog-type="BlueBlue" data-frog-name="Blue & Blue">
                    <div class="frog-image" style="background-image: url('../ToxicFrog/BlueBlue/ToxicFrogBlueBlue_Idle.png')"></div>
                    <span class="frog-name">Blue & Blue</span>
                </button>

                <!-- BlueBrown -->
                <button class="frog-button" data-frog-type="BlueBrown" data-frog-name="Blue & Brown">
                    <div class="frog-image" style="background-image: url('../ToxicFrog/BlueBrown/ToxicFrogBlueBrown_Idle.png')"></div>
                    <span class="frog-name">Blue & Brown</span>
                </button>

                <!-- GreenBlue -->
                <button class="frog-button" data-frog-type="GreenBlue" data-frog-name="Green & Blue">
                    <div class="frog-image" style="background-image: url('../ToxicFrog/GreenBlue/ToxicFrogGreenBlue_Idle.png')"></div>
                    <span class="frog-name">Green & Blue</span>
                </button>

                <!-- GreenBrown -->
                <button class="frog-button" data-frog-type="GreenBrown" data-frog-name="Green & Brown">
                    <div class="frog-image" style="background-image: url('../ToxicFrog/GreenBrown/ToxicFrogGreenBrown_Idle.png')"></div>
                    <span class="frog-name">Green & Brown</span>
                </button>

                <!-- PurpleBlue -->
                <button class="frog-button" data-frog-type="PurpleBlue" data-frog-name="Purple & Blue">
                    <div class="frog-image" style="background-image: url('../ToxicFrog/PurpleBlue/ToxicFrogPurpleBlue_Idle.png')"></div>
                    <span class="frog-name">Purple & Blue</span>
                </button>

                <!-- PurpleWhite -->
                <button class="frog-button" data-frog-type="PurpleWhite" data-frog-name="Purple & White">
                    <div class="frog-image" style="background-image: url('../ToxicFrog/PurpleWhite/ToxicFrogPurpleWhite_Idle.png')"></div>
                    <span class="frog-name">Purple & White</span>
                </button>
            </div>
        </div>

        <!-- Sekcja informacyjna -->
        <div class="info-section" id="infoSection" style="display: none;">
            <h3>Twój profil</h3>
            <p>Nickname: <strong id="selectedNickname"></strong></p>
            <p>Wybrana żabka: <strong id="selectedFrog"></strong></p>
            <p>Twoje ID: <strong id="playerID"></strong></p>
            <button id="startGameBtn" class="start-button">Zacznij grę!</button>
        </div>
    </div>

    <script src="mainpage.js"></script>
</body>
</html>
