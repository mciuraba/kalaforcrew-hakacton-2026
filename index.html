<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐸 FrogTalk</title>
  <link rel="stylesheet" href="style.css">
</head>
<script>
  if (!localStorage.getItem('frogPlayer')) {
    window.location.href = 'mainpage.html';
  }
</script>
<body>
  <canvas id="gameCanvas"></canvas>

  <div id="chat-ui">
    <input id="chat-input" type="text" placeholder="Ribbit..." maxlength="50">
    <button onclick="FB.sendMessage()">Send</button>
  </div>

  <div id="player-count">0 / 10</div>
    <div id="controls-hint">
    WASD / ↑↓←→ — ruch<br>
    ENTER — wyślij wiadomość<br>
    🐸 podejdź blisko żeby gadać
    </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <script src="config.js"></script>
  <script src="firebase.js"></script>
  <script src="board.js"></script>
  <script src="game.js"></script>
</body>
</html>
